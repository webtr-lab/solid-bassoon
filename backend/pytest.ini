[pytest]
minversion = 6.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

markers =
    unit: Unit tests
    integration: Integration tests
    auth: Authentication-related tests
    api: API endpoint tests
    db: Database-related tests
    security: Security-related tests
