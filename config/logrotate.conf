# Log rotation configuration for GPS Tracker Application
#
# This file can be used with logrotate to manage log files on the host system.
# The Python logging system already includes rotation (10MB x 10 files),
# but this provides additional host-level management.
#
# To install:
# 1. Copy this file: sudo cp logrotate.conf /etc/logrotate.d/gps-tracker
# 2. Test: sudo logrotate -d /etc/logrotate.d/gps-tracker
# 3. Logrotate runs daily via cron automatically

/home/demo/effective-guide/logs/*.log {
    # Rotate daily
    daily

    # Keep 30 days of logs
    rotate 30

    # Don't rotate if log is empty
    notifempty

    # Compress old logs (keeps .gz files)
    compress

    # Delay compression until next rotation (keeps most recent rotated log uncompressed)
    delaycompress

    # Don't error if log file is missing
    missingok

    # Create new log files with these permissions
    create 0644 demo demo

    # Use date as suffix for rotated files (e.g., app.log-20251030)
    dateext

    # Date format for rotated files
    dateformat -%Y%m%d

    # Don't rotate file if it's shared by multiple processes
    sharedscripts

    # After rotation, you could restart the application to pick up new log files
    # However, the RotatingFileHandler already handles this, so no action needed
    postrotate
        # Optionally send signal to application to reopen log files
        # docker compose restart gps_backend > /dev/null 2>&1 || true
    endscript
}
