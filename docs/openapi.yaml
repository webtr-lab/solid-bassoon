openapi: 3.0.0
info:
  title: Maps Tracker API
  description: Real-time GPS vehicle tracking application with location history and place of interest management
  version: 1.0.0
  contact:
    name: Maps Tracker Support
    url: https://github.com/your-org/maps-tracker
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:5000/api
    description: Local development server
  - url: https://api.example.com/api
    description: Production server

tags:
  - name: Health
    description: System health check endpoints
  - name: Authentication
    description: User authentication and authorization
  - name: Vehicles
    description: Vehicle management and tracking
  - name: Locations
    description: GPS location data
  - name: Saved Locations
    description: Detected stops and manually saved locations
  - name: Places of Interest
    description: Points of interest management
  - name: Reports
    description: Analytics and visit reports
  - name: Geocoding
    description: Address lookup and geocoding
  - name: Backups
    description: Backup and restore operations
  - name: Users
    description: User management (admin only)

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          description: User ID
        username:
          type: string
          description: Unique username
        email:
          type: string
          format: email
          description: Email address
        role:
          type: string
          enum: [admin, manager, viewer]
          description: User role
        is_active:
          type: boolean
          description: Whether user account is active
        must_change_password:
          type: boolean
          description: Whether user must change password on next login
        created_at:
          type: string
          format: date-time
          description: Account creation timestamp
      required:
        - id
        - username
        - email
        - role

    Vehicle:
      type: object
      properties:
        id:
          type: integer
          description: Vehicle ID
        name:
          type: string
          description: Vehicle name
        device_id:
          type: string
          description: Unique device identifier
        description:
          type: string
          description: Vehicle description
        status:
          type: string
          enum: [active, inactive, offline]
          description: Vehicle status
        last_location:
          $ref: '#/components/schemas/Location'
        last_update:
          type: string
          format: date-time
          description: Last location update timestamp
      required:
        - id
        - name
        - device_id

    Location:
      type: object
      properties:
        id:
          type: integer
          description: Location ID
        latitude:
          type: number
          format: double
          description: Latitude coordinate
        longitude:
          type: number
          format: double
          description: Longitude coordinate
        speed:
          type: number
          format: float
          description: Speed in km/h
        heading:
          type: number
          format: float
          description: Direction heading (0-360 degrees)
        accuracy:
          type: number
          format: float
          description: GPS accuracy in meters
        timestamp:
          type: string
          format: date-time
          description: Location timestamp
        vehicle_id:
          type: integer
          description: Associated vehicle ID
      required:
        - id
        - latitude
        - longitude
        - timestamp
        - vehicle_id

    SavedLocation:
      type: object
      properties:
        id:
          type: integer
          description: Saved location ID
        name:
          type: string
          description: Location name
        latitude:
          type: number
          format: double
          description: Latitude coordinate
        longitude:
          type: number
          format: double
          description: Longitude coordinate
        address:
          type: string
          description: Geocoded address
        notes:
          type: string
          description: Notes about the location
        arrival_time:
          type: string
          format: date-time
          description: When vehicle arrived at location
        departure_time:
          type: string
          format: date-time
          description: When vehicle left location
        duration:
          type: integer
          description: Duration at location in minutes
        vehicle_id:
          type: integer
          description: Associated vehicle ID
      required:
        - id
        - name
        - latitude
        - longitude
        - vehicle_id

    PlaceOfInterest:
      type: object
      properties:
        id:
          type: integer
          description: Place ID
        name:
          type: string
          description: Place name
        category:
          type: string
          description: Place category (e.g., 'gas station', 'warehouse')
        latitude:
          type: number
          format: double
          description: Latitude coordinate
        longitude:
          type: number
          format: double
          description: Longitude coordinate
        address:
          type: string
          description: Full address
        phone:
          type: string
          description: Contact phone number
        email:
          type: string
          format: email
          description: Contact email
        website:
          type: string
          format: uri
          description: Website URL
        notes:
          type: string
          description: Additional notes
      required:
        - id
        - name
        - latitude
        - longitude

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
        details:
          type: object
          description: Additional error details
        timestamp:
          type: string
          format: date-time
          description: Error timestamp
      required:
        - error

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
      description: Session-based authentication

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Unauthorized"

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Insufficient permissions for this action"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Resource not found"

    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Resource already exists"

    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Too many requests"
            remaining_attempts: 2

security:
  - cookieAuth: []

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Check if API is running
      operationId: getHealth
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  message:
                    type: string
                    example: "Maps Tracker API is running"

  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register new user
      description: Create a new user account
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 50
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  description: Password with at least 8 characters, 1 uppercase, 1 number, 1 symbol
              required:
                - username
                - email
                - password
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User registered successfully"
        '400':
          description: Invalid input or user already exists
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user and create session
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
                - username
                - password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Too many login attempts
          $ref: '#/components/responses/TooManyRequests'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: User logout
      description: End current user session
      operationId: logoutUser
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Logged out successfully"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/check:
    get:
      tags:
        - Authentication
      summary: Check authentication status
      description: Get current user info and auth status
      operationId: checkAuth
      responses:
        '200':
          description: Auth status
          content:
            application/json:
              schema:
                type: object
                properties:
                  authenticated:
                    type: boolean
                  user:
                    $ref: '#/components/schemas/User'

  /auth/change-password:
    post:
      tags:
        - Authentication
      summary: Change password
      description: Update user password
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
              required:
                - current_password
                - new_password
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /vehicles:
    get:
      tags:
        - Vehicles
      summary: List all vehicles
      description: Get all vehicles the user has access to
      operationId: listVehicles
      parameters:
        - name: status
          in: query
          description: Filter by status
          schema:
            type: string
            enum: [active, inactive, offline]
        - name: limit
          in: query
          description: Number of results to return
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          description: Number of results to skip
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vehicle'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Vehicles
      summary: Create vehicle
      description: Add a new vehicle (admin only)
      operationId: createVehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                device_id:
                  type: string
                  description: Unique device identifier
                description:
                  type: string
              required:
                - name
                - device_id
      responses:
        '201':
          description: Vehicle created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /vehicles/{id}:
    get:
      tags:
        - Vehicles
      summary: Get vehicle details
      description: Get details of a specific vehicle
      operationId: getVehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Vehicle details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Vehicles
      summary: Update vehicle
      description: Update vehicle details (admin only)
      operationId: updateVehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Vehicle updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Vehicles
      summary: Delete vehicle
      description: Remove a vehicle (admin only)
      operationId: deleteVehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Vehicle deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /vehicles/{id}/location:
    get:
      tags:
        - Locations
      summary: Get latest location
      description: Get the most recent location for a vehicle
      operationId: getLatestLocation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Latest location
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '404':
          $ref: '#/components/responses/NotFound'

  /vehicles/{id}/history:
    get:
      tags:
        - Locations
      summary: Get location history
      description: Get historical track of a vehicle
      operationId: getLocationHistory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: hours
          in: query
          description: Number of hours of history to return
          schema:
            type: integer
            default: 24
            enum: [1, 6, 24, 72, 168]
        - name: limit
          in: query
          description: Maximum number of locations
          schema:
            type: integer
            default: 1000
      responses:
        '200':
          description: Location history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Location'
        '404':
          $ref: '#/components/responses/NotFound'

  /vehicles/{id}/saved-locations:
    get:
      tags:
        - Saved Locations
      summary: Get saved locations
      description: Get all saved locations (stops) for a vehicle
      operationId: getSavedLocations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of saved locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SavedLocation'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags:
        - Saved Locations
      summary: Create saved location
      description: Manually save a location for a vehicle
      operationId: createSavedLocation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                latitude:
                  type: number
                longitude:
                  type: number
                notes:
                  type: string
              required:
                - name
                - latitude
                - longitude
      responses:
        '201':
          description: Location saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedLocation'
        '404':
          $ref: '#/components/responses/NotFound'

  /gps:
    post:
      tags:
        - Locations
      summary: Submit GPS location
      description: Receive location data from GPS device
      operationId: submitGPSLocation
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                device_id:
                  type: string
                latitude:
                  type: number
                longitude:
                  type: number
                speed:
                  type: number
                heading:
                  type: number
                accuracy:
                  type: number
              required:
                - device_id
                - latitude
                - longitude
      responses:
        '200':
          description: Location received
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /places-of-interest:
    get:
      tags:
        - Places of Interest
      summary: List places of interest
      description: Get all places of interest
      operationId: listPlaces
      responses:
        '200':
          description: List of places
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlaceOfInterest'

    post:
      tags:
        - Places of Interest
      summary: Create place
      description: Add a new place of interest
      operationId: createPlace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                category:
                  type: string
                latitude:
                  type: number
                longitude:
                  type: number
                address:
                  type: string
                phone:
                  type: string
                email:
                  type: string
                website:
                  type: string
              required:
                - name
                - latitude
                - longitude
      responses:
        '201':
          description: Place created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceOfInterest'

  /reports/visits:
    get:
      tags:
        - Reports
      summary: Get visit analytics
      description: Get visit statistics matching vehicles to places of interest
      operationId: getVisitReports
      parameters:
        - name: start
          in: query
          description: Start date (ISO 8601)
          schema:
            type: string
            format: date-time
          required: true
        - name: end
          in: query
          description: End date (ISO 8601)
          schema:
            type: string
            format: date-time
          required: true
      responses:
        '200':
          description: Visit analytics
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    place_id:
                      type: integer
                    place_name:
                      type: string
                    vehicle_id:
                      type: integer
                    vehicle_name:
                      type: string
                    visit_count:
                      type: integer
                    total_duration:
                      type: integer

  /geocode:
    get:
      tags:
        - Geocoding
      summary: Geocode address
      description: Convert address to coordinates (or vice versa)
      operationId: geocodeAddress
      parameters:
        - name: q
          in: query
          description: Address or coordinates to geocode
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Geocoding results
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    address:
                      type: string
                    latitude:
                      type: number
                    longitude:
                      type: number

  /backups:
    get:
      tags:
        - Backups
      summary: List backups
      description: Get all backup files (admin only)
      operationId: listBackups
      responses:
        '200':
          description: List of backups
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    filename:
                      type: string
                    size:
                      type: integer
                    created:
                      type: string
                      format: date-time

    post:
      tags:
        - Backups
      summary: Create backup
      description: Create a new database backup (admin only)
      operationId: createBackup
      responses:
        '201':
          description: Backup created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  filename:
                    type: string

  /users:
    get:
      tags:
        - Users
      summary: List users
      description: Get all users (admin only)
      operationId: listUsers
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /users/{id}:
    put:
      tags:
        - Users
      summary: Update user
      description: Update user details or role (admin only)
      operationId: updateUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [admin, manager, viewer]
                is_active:
                  type: boolean
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

    delete:
      tags:
        - Users
      summary: Delete user
      description: Remove a user account (admin only)
      operationId: deleteUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: User deleted
