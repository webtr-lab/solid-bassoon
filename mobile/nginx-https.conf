server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # When accessed as subdirectory through frontend proxy
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Allow gzip compression for better performance
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
