server {
    listen 80;
    server_name maps.devnan.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name maps.devnan.com;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate /etc/nginx/ssl/live/maps.devnan.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/maps.devnan.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increased timeouts for long-running operations like backup/restore
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location /mobile/ {
        # Serve mobile interface from the mobile service
        proxy_pass http://mobile:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /mobile {
        # Redirect /mobile to /mobile/ for consistency
        return 301 /mobile/;
    }
}
