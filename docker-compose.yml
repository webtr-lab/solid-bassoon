services:
  db:
    build:
      context: ./backend
      dockerfile: postgres.Dockerfile
    container_name: maps_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./database:/var/lib/postgresql/data
      - ./backups:/backups
      - ./backups/wal-archive:/var/lib/postgresql/wal-archive
    networks:
      - maps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maps_backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      FLASK_ENV: ${FLASK_ENV}
      CORS_ORIGINS: ${CORS_ORIGINS}
      NOMINATIM_URL: ${NOMINATIM_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FRONTEND_URL: ${FRONTEND_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./backups:/app/backups:z
      - ./logs:/app/logs:z
      - ./scripts:/app/scripts:ro
      - ./secrets:/app/secrets:z
    depends_on:
      db:
        condition: service_healthy
    networks:
      - maps-network
    restart: unless-stopped
    ports:
      - "0.0.0.0:5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: maps_frontend
    environment:
      - VITE_API_URL=https://${DOMAIN}/api
    depends_on:
      - backend
    networks:
      - maps-network
    restart: unless-stopped
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
      - ./frontend/nginx-https.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"

  mobile:
    image: nginx:alpine
    container_name: maps_mobile
    volumes:
      - ./mobile:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./mobile/nginx-https.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - maps-network
    restart: unless-stopped
    ports:
      - "0.0.0.0:8080:80"
      - "0.0.0.0:8443:443"

  nominatim:
    image: mediagis/nominatim:4.4
    container_name: maps_nominatim
    environment:
      # Nominatim configuration
      PBF_URL: file:///nominatim/data/suriname-latest.osm.pbf
      REPLICATION_URL: https://download.geofabrik.de/south-america/suriname-updates/
      IMPORT_WIKIPEDIA: "false"
      IMPORT_US_POSTCODES: "false"
      IMPORT_GB_POSTCODES: "false"
      THREADS: 4
      # Optimization for small dataset
      NOMINATIM_THREADS: 4
    volumes:
      - ./nominatim-data:/nominatim/data
      - nominatim-db:/var/lib/postgresql/14/main
    networks:
      - maps-network
    restart: unless-stopped
    ports:
      - "0.0.0.0:8081:8080"
    shm_size: 1gb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/search?q=Paramaribo&format=json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: maps_alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      - maps-network
    restart: unless-stopped
    ports:
      - "127.0.0.1:9093:9093"
    healthcheck:
      test: ["CMD", "wget", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: maps_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    networks:
      - maps-network
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - backend
      - alertmanager
    healthcheck:
      test: ["CMD", "wget", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:10.1.5
    container_name: maps_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=${GRAFANA_URL:-http://localhost:3001}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - maps-network
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: maps_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - maps-network
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  maps-network:
    driver: bridge

volumes:
  nominatim-db:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  redis-data:

# IMPORTANT: Volume Initialization
# Before running 'docker compose up' for the first time, execute:
#   ./scripts/setup/init-docker-volumes.sh
#
# This ensures logs, backups, and database directories are created with
# proper permissions. Without this step, you may encounter permission errors
# when containers try to write to these directories.
#
# The init script will:
# - Create ./logs, ./backups, ./database, ./nominatim-data directories
# - Set owner to current user
# - Set permissions: 750 for logs/backups (owner+group only, no world access), 700 for database
# - Warn if containers are running and offer to stop them
#
# Security: Using UID 1000 (default first non-root user) in the appuser ensures
# proper file ownership mapping. The backend container user (appuser) will have
# the same UID as the host user, eliminating permission conflicts.
