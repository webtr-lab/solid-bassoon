services:
  db:
    image: postgres:15-alpine
    container_name: gps_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./database:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - gps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gps_backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      FLASK_ENV: ${FLASK_ENV}
      CORS_ORIGINS: ${CORS_ORIGINS}
    volumes:
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gps-network
    restart: unless-stopped
    ports:
      - "0.0.0.0:5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gps_frontend
    environment:
      - VITE_API_URL=https://${DOMAIN}/api
    depends_on:
      - backend
    networks:
      - gps-network
    restart: unless-stopped
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
      - ./frontend/nginx-https.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"

  mobile:
    image: nginx:alpine
    container_name: gps_mobile
    volumes:
      - ./mobile:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./mobile/nginx-https.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - gps-network
    restart: unless-stopped
    ports:
      - "0.0.0.0:8080:80"
      - "0.0.0.0:8443:443"

networks:
  gps-network:
    driver: bridge
